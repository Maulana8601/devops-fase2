name: CI/CD Pipeline

# Kapan workflow ini dijalankan
on:
  push:
    branches:
      - main          # setiap push ke branch main
  pull_request:
    branches:
      - main          # setiap ada pull request ke main

jobs:

  # ─────────────────────────────
  # JOB 1: Testing & Validasi
  # ─────────────────────────────
  test:
    name: 🧪 Test & Validate
    runs-on: ubuntu-latest

    steps:
      # Checkout kode dari repository
      - name: Checkout kode
        uses: actions/checkout@v4

      # Validasi file YAML compose
      - name: Validasi compose.yaml
        run: |
          docker compose config

      # Cek struktur file penting ada semua
      - name: Cek file penting
        run: |
          test -f compose.yaml && echo "✅ compose.yaml ada"
          test -f app/Containerfile && echo "✅ Containerfile ada"
          test -f app/index.html && echo "✅ index.html ada"

  # ─────────────────────────────
  # JOB 2: Build Image
  # ─────────────────────────────
  build:
    name: 🔨 Build Image
    runs-on: ubuntu-latest
    needs: test          # job ini baru jalan kalau job test SUKSES

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      # Setup Docker Buildx (builder modern)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login ke GitHub Container Registry (GHCR)
      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build dan push image
      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Containerfile
          push: true
          tags: |
            ghcr.io/maulana8601/web-app:latest
            ghcr.io/maulana8601/web-app:${{ github.sha }}

  # ─────────────────────────────
  # JOB 3: Deploy (Simulasi)
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build         # baru jalan kalau build SUKSES
    if: github.ref == 'refs/heads/main'   # hanya untuk push ke main

    steps:
      - name: Simulasi Deploy
        run: |
          echo "🚀 Deploying image ke server..."
          echo "Image: ghcr.io/${{ github.repository_owner }}/web-app:${{ github.sha }}"
          echo "✅ Deploy sukses!"
